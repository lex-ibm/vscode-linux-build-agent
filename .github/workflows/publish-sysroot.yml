name: Publish Sysroot

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-22.04
    environment: publish-sysroot
    steps:
      - name: 'Create release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists, reusing it."
          else
            echo "Creating release $TAG."
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Release $TAG" \
              --notes "Sysroots for $TAG"
          fi

  publish:
    needs: prepare-release
    runs-on: ubuntu-22.04
    environment: publish-sysroot
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: 'ppc64el-gcc-10.5.0-glibc-2.28.config'
            arch: 'ppc64el'
            pkg: 'powerpc64le-linux-gnu'
            suffix: '-glibc-2.28-gcc-10.5.0'
          - config: 's390x-gcc-10.5.0-glibc-2.28.config'
            arch: 's390x'
            pkg: 's390x-linux-gnu'
            suffix: '-glibc-2.28'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 'Check if sysroot is already published'
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          ASSET: ${{ matrix.pkg }}${{ matrix.suffix }}.tar.gz
        run: |
          set -e
          assets="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
            --json assets --jq '.assets[].name' 2>/dev/null || true)"
          if printf '%s\n' "$assets" | grep -Fxq "$ASSET"; then
            echo "Asset $ASSET already exists on release $TAG, skipping build."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Asset $ASSET not found on release $TAG, building it."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Prepare dependencies'
        if: steps.check.outputs.exists == 'false'
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y gcc g++ gperf bison flex texinfo help2man make libncurses5-dev \
          python3-dev autoconf automake libtool libtool-bin gawk wget bzip2 xz-utils unzip \
          patch rsync meson ninja-build curl

      - name: 'Setup crosstool-ng'
        if: steps.check.outputs.exists == 'false'
        run: |
          set -e
          wget http://crosstool-ng.org/download/crosstool-ng/crosstool-ng-1.26.0.tar.bz2
          tar -xjf crosstool-ng-1.26.0.tar.bz2
          cd crosstool-ng-1.26.0
          ./configure --prefix=`pwd`/out
          make
          make install

      - name: 'Build toolchain'
        if: steps.check.outputs.exists == 'false'
        run: |
          set -e
          export PATH=$PATH:`pwd`/crosstool-ng-1.26.0/out/bin
          mkdir toolchain-dir
          cd toolchain-dir
          cat ../${{ matrix.config }} > .config
          ct-ng build

      - name: 'Install additional libraries'
        if: steps.check.outputs.exists == 'false'
        run: |
          set -e
          chmod 0755 -R `pwd`/toolchain-dir/${{ matrix.pkg }}
          sudo ./sysroot-scripts/sysroot-creator.sh build ${{ matrix.arch }} \
          `pwd`/toolchain-dir/${{ matrix.pkg }}/${{ matrix.pkg }}/sysroot

      - name: 'Create pipeline asset'
        if: steps.check.outputs.exists == 'false'
        run: |
          set -e
          cd toolchain-dir
          tar -czf ${{ matrix.pkg }}${{ matrix.suffix }}.tar.gz ${{ matrix.pkg }}

      - name: 'Publish artifact'
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          ASSET: ${{ matrix.pkg }}${{ matrix.suffix }}.tar.gz
        run: |
          set -e
          gh release upload "$TAG" "toolchain-dir/$ASSET" \
            --repo "$GITHUB_REPOSITORY" --clobber
